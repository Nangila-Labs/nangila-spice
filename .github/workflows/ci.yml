name: Nangila SPICE CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy lint
        run: |
          cargo clippy -p nangila-node --lib --bins -- \
            -D warnings \
            -A dead_code \
            -A clippy::new_without_default \
            -A clippy::too_many_arguments \
            -A clippy::manual_is_multiple_of \
            -A clippy::unwrap_or_default \
            -A clippy::single_match \
            -A clippy::needless_range_loop \
            -A clippy::manual_split_once \
            -A clippy::manual_pattern_char_comparison \
            -A clippy::manual_strip \
            -A clippy::if_same_then_else \
            -A clippy::assign_op_pattern \
            -A clippy::doc_overindented_list_items \
            -A clippy::len_without_is_empty \
            -A clippy::unused_enumerate_index

      - name: Run Rust tests
        run: cargo test -p nangila-node --verbose

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ngspice

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-py-${{ matrix.python-version }}-${{ hashFiles('Cargo.lock') }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pytest pytest-cov

      - name: Build nangila-node
        run: cargo build -p nangila-node --bin nangila-node

      - name: Run Python tests
        env:
          PYTHONPATH: src
        run: |
          python -m pytest src/tests/ -v \
            --tb=short \
            --cov=src/nangila_spice \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-${{ matrix.python-version }}
          path: coverage.xml

  binary-smoke:
    name: Binary Smoke Test
    runs-on: ubuntu-latest
    needs: rust-tests
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-smoke-${{ hashFiles('Cargo.lock') }}

      - name: Build nangila-node binary
        run: cargo build -p nangila-node --bin nangila-node

      - name: Smoke test inverter.sp
        run: |
          ./target/debug/nangila-node \
            --partition benchmarks/reference_circuits/inverter.sp \
            --tstop 1e-9 \
            --dt 1e-12 \
            --waveform-json /tmp/inverter.json
          test -s /tmp/inverter.json

      - name: Smoke test sram_6t.sp
        run: |
          ./target/debug/nangila-node \
            --partition benchmarks/reference_circuits/sram_6t.sp \
            --tstop 2e-9 \
            --dt 1e-12 \
            --waveform-json /tmp/sram_6t.json
          test -s /tmp/sram_6t.json
